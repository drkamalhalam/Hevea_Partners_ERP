openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rubber Plantation Partnership API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile, role, and project assignment operations
  - name: projects
    description: Plantation project operations
  - name: partners
    description: Partner operations
  - name: agreements
    description: Agreement operations
  - name: dashboard
    description: Dashboard and analytics
  - name: production
    description: Rubber production and sales records

paths:
  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user role and assigned projects
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: upsertMe
      tags: [users]
      summary: Upsert current user role record (called on first login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserInput"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users with roles (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /users/{clerkUserId}/role:
    put:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserRoleInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{clerkUserId}/projects:
    post:
      operationId: assignUserToProject
      tags: [users]
      summary: Assign a user to a project
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignProjectInput"
      responses:
        "200":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /users/{clerkUserId}/projects/{projectId}:
    delete:
      operationId: removeUserFromProject
      tags: [users]
      summary: Remove a user from a project assignment (admin only)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
        - in: path
          name: projectId
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all plantation projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new plantation project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a plantation project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a plantation project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a plantation project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /partners:
    get:
      operationId: listPartners
      tags: [partners]
      summary: List all partners
      responses:
        "200":
          description: List of partners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Partner"
    post:
      operationId: createPartner
      tags: [partners]
      summary: Register a new partner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  /partners/{id}:
    get:
      operationId: getPartner
      tags: [partners]
      summary: Get a partner by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Partner details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"
        "404":
          description: Not found
    patch:
      operationId: updatePartner
      tags: [partners]
      summary: Update a partner
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PartnerUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Partner"

  /agreements:
    get:
      operationId: listAgreements
      tags: [agreements]
      summary: List all partnership agreements
      responses:
        "200":
          description: List of agreements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agreement"
    post:
      operationId: createAgreement
      tags: [agreements]
      summary: Create a new partnership agreement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgreementInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"

  /agreements/{id}:
    get:
      operationId: getAgreement
      tags: [agreements]
      summary: Get an agreement by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agreement details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"
        "404":
          description: Not found
    patch:
      operationId: updateAgreement
      tags: [agreements]
      summary: Update an agreement
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgreementUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agreement"

  /stock:
    get:
      operationId: getStockSummary
      tags: [production]
      summary: Get current rubber stock levels per project (produced minus sold)
      responses:
        "200":
          description: Stock summary per project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSummary"

  /production:
    get:
      operationId: listProductionRecords
      tags: [production]
      summary: List all rubber production records
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of production records
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductionRecord"
    post:
      operationId: createProductionRecord
      tags: [production]
      summary: Log a new rubber production and sale record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProductionInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionRecord"

  /production/{id}:
    get:
      operationId: getProductionRecord
      tags: [production]
      summary: Get a production record by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Production record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductionRecord"
        "404":
          description: Not found
    delete:
      operationId: deleteProductionRecord
      tags: [production]
      summary: Delete a production record
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get overall dashboard summary metrics
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/my-portfolio:
    get:
      operationId: getMyPortfolio
      tags: [dashboard]
      summary: Get current user's portfolio and agreements
      responses:
        "200":
          description: User portfolio
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PartnerPortfolio"

  /dashboard/activity:
    get:
      operationId: getRecentActivity
      tags: [dashboard]
      summary: Get recent project activity feed
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /dashboard/revenue:
    get:
      operationId: getRevenueStats
      tags: [dashboard]
      summary: Get revenue statistics across projects
      responses:
        "200":
          description: Revenue statistics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueStats"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Project:
      type: object
      required: [id, name, location, district, state, landArea, landAreaUnit, status, startDate, termYears, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        location:
          type: string
        village:
          type: ["string", "null"]
        district:
          type: string
        state:
          type: string
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: ["number", "null"]
        landValuePerUnit:
          type: ["number", "null"]
        status:
          type: string
          enum: [planning, developing, maturing, tapping, completed]
        startDate:
          type: string
        expectedMaturityDate:
          type: ["string", "null"]
        termYears:
          type: integer
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    ProjectInput:
      type: object
      required: [name, location, district, state, landArea, landAreaUnit, status, startDate, termYears]
      properties:
        name:
          type: string
        location:
          type: string
        village:
          type: string
        district:
          type: string
        state:
          type: string
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: number
        landValuePerUnit:
          type: number
        status:
          type: string
          enum: [planning, developing, maturing, tapping, completed]
        startDate:
          type: string
        expectedMaturityDate:
          type: string
        termYears:
          type: integer
        notes:
          type: string

    ProjectUpdate:
      type: object
      properties:
        name:
          type: string
        location:
          type: string
        village:
          type: string
        district:
          type: string
        state:
          type: string
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: number
        landValuePerUnit:
          type: number
        status:
          type: string
          enum: [planning, developing, maturing, tapping, completed]
        startDate:
          type: string
        expectedMaturityDate:
          type: string
        termYears:
          type: integer
        notes:
          type: string

    Partner:
      type: object
      required: [id, name, role, email, phone, address, clerkUserId, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        role:
          type: string
          enum: [project_developer, landowner, investor]
        email:
          type: string
        phone:
          type: ["string", "null"]
        address:
          type: string
        aadhaarLast4:
          type: ["string", "null"]
        clerkUserId:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    PartnerInput:
      type: object
      required: [name, role, email, address]
      properties:
        name:
          type: string
        role:
          type: string
          enum: [project_developer, landowner, investor]
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        aadhaarLast4:
          type: string
        clerkUserId:
          type: string
        notes:
          type: string

    PartnerUpdate:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [project_developer, landowner, investor]
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        aadhaarLast4:
          type: string
        notes:
          type: string

    Agreement:
      type: object
      required: [id, projectId, projectName, landOwnerId, landOwnerName, projectDeveloperId, projectDeveloperName, executionDate, executionPlace, termYears, landArea, landAreaUnit, landNotionalValue, landValuePerUnit, landContributionAdjustment, yearlyEscalation, status, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectName:
          type: string
        landOwnerId:
          type: integer
        landOwnerName:
          type: string
        projectDeveloperId:
          type: integer
        projectDeveloperName:
          type: string
        executionDate:
          type: string
        executionPlace:
          type: string
        termYears:
          type: integer
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: number
        landValuePerUnit:
          type: number
        landContributionAdjustment:
          type: number
        yearlyEscalation:
          type: number
        ownershipShareLandowner:
          type: ["number", "null"]
        ownershipShareDeveloper:
          type: ["number", "null"]
        revenueModel:
          type: string
          enum: [contribution, fifty_percent_revenue]
        status:
          type: string
          enum: [draft, active, matured, terminated]
        northBoundary:
          type: ["string", "null"]
        southBoundary:
          type: ["string", "null"]
        eastBoundary:
          type: ["string", "null"]
        westBoundary:
          type: ["string", "null"]
        gpsLat:
          type: ["number", "null"]
        gpsLng:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]

    AgreementInput:
      type: object
      required: [projectId, landOwnerId, projectDeveloperId, executionDate, executionPlace, termYears, landArea, landAreaUnit, landNotionalValue, landValuePerUnit, landContributionAdjustment, yearlyEscalation]
      properties:
        projectId:
          type: integer
        landOwnerId:
          type: integer
        projectDeveloperId:
          type: integer
        executionDate:
          type: string
        executionPlace:
          type: string
        termYears:
          type: integer
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: number
        landValuePerUnit:
          type: number
        landContributionAdjustment:
          type: number
        yearlyEscalation:
          type: number
        revenueModel:
          type: string
          enum: [contribution, fifty_percent_revenue]
        northBoundary:
          type: string
        southBoundary:
          type: string
        eastBoundary:
          type: string
        westBoundary:
          type: string
        gpsLat:
          type: number
        gpsLng:
          type: number
        notes:
          type: string

    AgreementUpdate:
      type: object
      properties:
        executionDate:
          type: string
        executionPlace:
          type: string
        termYears:
          type: integer
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: number
        landValuePerUnit:
          type: number
        landContributionAdjustment:
          type: number
        yearlyEscalation:
          type: number
        ownershipShareLandowner:
          type: number
        ownershipShareDeveloper:
          type: number
        revenueModel:
          type: string
          enum: [contribution, fifty_percent_revenue]
        status:
          type: string
          enum: [draft, active, matured, terminated]
        northBoundary:
          type: string
        southBoundary:
          type: string
        eastBoundary:
          type: string
        westBoundary:
          type: string
        gpsLat:
          type: number
        gpsLng:
          type: number
        notes:
          type: string

    DashboardSummary:
      type: object
      required: [totalProjects, totalPartners, totalAgreements, totalLandArea, activeProjectsCount, maturingProjectsCount, tappingProjectsCount]
      properties:
        totalProjects:
          type: integer
        totalPartners:
          type: integer
        totalAgreements:
          type: integer
        totalLandArea:
          type: number
        activeProjectsCount:
          type: integer
        maturingProjectsCount:
          type: integer
        tappingProjectsCount:
          type: integer

    PartnerPortfolio:
      type: object
      required: [partnerId, partnerName, role, agreements, totalLandArea, totalOwnershipShare]
      properties:
        partnerId:
          type: ["integer", "null"]
        partnerName:
          type: string
        role:
          type: string
        agreements:
          type: array
          items:
            $ref: "#/components/schemas/Agreement"
        totalLandArea:
          type: number
        totalOwnershipShare:
          type: number

    ActivityItem:
      type: object
      required: [id, type, description, entityId, entityType, createdAt]
      properties:
        id:
          type: integer
        type:
          type: string
        description:
          type: string
        entityId:
          type: integer
        entityType:
          type: string
        createdAt:
          type: string

    StockSummary:
      type: object
      required: [projectId, projectName, location, district, totalProducedKg, totalSoldKg, currentStockKg]
      properties:
        projectId:
          type: integer
        projectName:
          type: string
        location:
          type: string
        district:
          type: string
        totalProducedKg:
          type: number
        totalSoldKg:
          type: number
        currentStockKg:
          type: number
        lastUpdatedAt:
          type: ["string", "null"]

    ProductionRecord:
      type: object
      required: [id, projectId, projectName, recordedAt, productionKg, soldKg, sellingPricePerKg, revenue, createdAt]
      properties:
        id:
          type: integer
        projectId:
          type: integer
        projectName:
          type: string
        recordedAt:
          type: string
        productionKg:
          type: number
        soldKg:
          type: number
        sellingPricePerKg:
          type: number
        revenue:
          type: number
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    ProductionInput:
      type: object
      required: [projectId, recordedAt, productionKg, soldKg, sellingPricePerKg]
      properties:
        projectId:
          type: integer
        recordedAt:
          type: string
          description: ISO datetime of when production/sale happened
        productionKg:
          type: number
          description: Total rubber produced in kg
        soldKg:
          type: number
          description: Quantity sold in kg
        sellingPricePerKg:
          type: number
          description: Selling price per kg in INR
        notes:
          type: string

    RevenueStats:
      type: object
      required: [projectId, projectName, year, revenue, landContributionAdjustment, profit]
      properties:
        projectId:
          type: integer
        projectName:
          type: string
        year:
          type: integer
        revenue:
          type: number
        landContributionAdjustment:
          type: number
        profit:
          type: number

    UserProfile:
      type: object
      required: [clerkUserId, role, assignedProjectIds]
      properties:
        clerkUserId:
          type: string
        role:
          type: string
          enum: [admin, developer, landowner, investor, employee, operational_staff]
        displayName:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        assignedProjectIds:
          type: array
          items:
            type: integer
        createdAt:
          type: string

    UpsertUserInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, developer, landowner, investor, employee, operational_staff]
        displayName:
          type: string
        email:
          type: string

    SetUserRoleInput:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [admin, developer, landowner, investor, employee, operational_staff]

    AssignProjectInput:
      type: object
      required: [projectId]
      properties:
        projectId:
          type: integer

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
