components:
  schemas:

    GovernanceOverride:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        projectName: { type: string, nullable: true }
        overrideType: { type: string }
        module: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        originalValue: { type: object, nullable: true, additionalProperties: true }
        finalValue: { type: object, nullable: true, additionalProperties: true }
        overrideReason: { type: string, nullable: true }
        actorId: { type: string, nullable: true }
        actorName: { type: string, nullable: true }
        actorRole: { type: string, nullable: true }
        relatedTable: { type: string, nullable: true }
        relatedRecordId: { type: string, nullable: true }
        supportingDocuments: { type: array, nullable: true, items: { type: object, additionalProperties: true } }
        metadata: { type: object, nullable: true, additionalProperties: true }
        occurredAt: { type: string }
        createdAt: { type: string }

    GovernanceOverrideAnalytics:
      type: object
      properties:
        total: { type: integer }
        byType:
          type: array
          items:
            type: object
            properties:
              overrideType: { type: string }
              count: { type: integer }
        byModule:
          type: array
          items:
            type: object
            properties:
              module: { type: string }
              count: { type: integer }
        byActor:
          type: array
          items:
            type: object
            properties:
              actorName: { type: string, nullable: true }
              actorRole: { type: string, nullable: true }
              count: { type: integer }
        byMonth:
          type: array
          items:
            type: object
            properties:
              month: { type: string }
              count: { type: integer }
        recentActivity:
          type: array
          items: { $ref: '#/components/schemas/GovernanceOverride' }

    Dispute:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        projectName: { type: string, nullable: true }
        disputeType: { type: string }
        status: { type: string }
        severity: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        raisedById: { type: string, nullable: true }
        raisedByName: { type: string, nullable: true }
        raisedByRole: { type: string, nullable: true }
        raisedAt: { type: string }
        relatedTable: { type: string, nullable: true }
        relatedRecordId: { type: string, nullable: true }
        supportingDocuments: { type: array, nullable: true, items: { type: object, additionalProperties: true } }
        resolvedAt: { type: string, nullable: true }
        resolvedById: { type: string, nullable: true }
        resolvedByName: { type: string, nullable: true }
        resolvedByRole: { type: string, nullable: true }
        resolutionSummary: { type: string, nullable: true }
        metadata: { type: object, nullable: true, additionalProperties: true }
        isActive: { type: boolean }
        updatedAt: { type: string }
        createdAt: { type: string }

    DisputeResolutionEvent:
      type: object
      properties:
        id: { type: string }
        disputeId: { type: string }
        projectId: { type: string, nullable: true }
        eventType: { type: string }
        previousStatus: { type: string, nullable: true }
        newStatus: { type: string, nullable: true }
        description: { type: string, nullable: true }
        actorId: { type: string, nullable: true }
        actorName: { type: string, nullable: true }
        actorRole: { type: string, nullable: true }
        metadata: { type: object, nullable: true, additionalProperties: true }
        performedAt: { type: string }

    DisputePendingSummary:
