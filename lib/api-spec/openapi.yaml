openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Rubber Plantation Partnership API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: users
    description: User profile, role, and project assignment operations
  - name: projects
    description: Plantation project operations
  - name: partners
    description: Partner operations
  - name: agreements
    description: Agreement operations
  - name: dashboard
    description: Dashboard and analytics
  - name: production
    description: Rubber production and sales records
  - name: templates
    description: Agreement template library and version management
  - name: storage
    description: Object storage upload and serving endpoints

paths:
  /me:
    get:
      operationId: getMe
      tags: [users]
      summary: Get current user role and assigned projects
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: upsertMe
      tags: [users]
      summary: Upsert current user role record (called on first login)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpsertUserInput"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /me/profile:
    patch:
      operationId: updateMyProfile
      tags: [users]
      summary: Update current user's own profile fields
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users with roles (admin only)
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserProfile"

  /users/{clerkUserId}:
    get:
      operationId: getUserProfile
      tags: [users]
      summary: Get a single user's full profile (admin/developer)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
        "404":
          description: Not found
    patch:
      operationId: updateUserProfile
      tags: [users]
      summary: Update a user's profile fields (admin only)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileInput"
      responses:
        "200":
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{clerkUserId}/role:
    put:
      operationId: updateUserRole
      tags: [users]
      summary: Update a user's role (admin only)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetUserRoleInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{clerkUserId}/projects:
    post:
      operationId: assignUserToProject
      tags: [users]
      summary: Assign a user to a project (optionally with a project-specific role)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignProjectInput"
      responses:
        "200":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /users/{clerkUserId}/projects/{projectId}:
    patch:
      operationId: updateProjectAssignment
      tags: [users]
      summary: Update project role for an existing assignment (admin only)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAssignmentInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
    delete:
      operationId: removeUserFromProject
      tags: [users]
      summary: Remove a user from a project assignment (admin only)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
        - in: path
          name: projectId
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /users/{clerkUserId}/activity:
    get:
      operationId: getUserActivity
      tags: [users]
      summary: Get recent activity for a specific user (admin/developer or own)
      parameters:
        - in: path
          name: clerkUserId
          required: true
          schema:
            type: string
        - in: query
          name: limit
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all plantation projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new plantation project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a plantation project by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a plantation project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProjectUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a plantation project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Deleted

  /projects/{id}/participants:
    get:
      operationId: listProjectParticipants
      tags: [projects]
      summary: List all participants in a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of project participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectParticipant"
    post:
      operationId: addProjectParticipant
      tags: [projects]
      summary: Add a user as a participant in a project (admin or developer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddParticipantInput"
      responses:
        "201":
          description: Participant added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectParticipant"
        "409":
          description: Conflict — landowner or developer slot already filled

  /projects/{id}/participants/{assignmentId}:
    patch:
      operationId: updateProjectParticipant
      tags: [projects]
      summary: Update a participant's role, status, join date, or notes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateParticipantInput"
      responses:
        "200":
          description: Updated participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectParticipant"
        "409":
          description: Conflict — role slot already filled
    delete:
      operationId: removeProjectParticipant
      tags: [projects]
      summary: Remove a participant from a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: assignmentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{id}/nominee:
    get:
      operationId: getProjectNominee
      tags: [projects]
      summary: Get the current nominee for a project (null if not set)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current nominee or null
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/ProjectNominee"
                  - type: "null"
    post:
      operationId: addProjectNominee
      tags: [projects]
      summary: Add a nominee for a project (project developer or admin)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNomineeInput"
      responses:
        "201":
          description: Nominee created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNominee"
        "409":
          description: A nominee already exists — use PUT to replace
    patch:
      operationId: editProjectNominee
      tags: [projects]
      summary: Edit details of the current nominee (name, phone, address, etc.)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNomineeInput"
      responses:
        "200":
          description: Updated nominee
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNominee"
        "404":
          description: No nominee on record for this project
    put:
      operationId: replaceProjectNominee
      tags: [projects]
      summary: Replace the current nominee (marks old as replaced, creates new)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNomineeInput"
      responses:
        "201":
          description: New nominee created, old record archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectNominee"
    delete:
      operationId: removeProjectNominee
      tags: [projects]
      summary: Remove the current nominee (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{id}/nominee/activation:
    get:
      operationId: getNomineeActivationWorkflow
      summary: Get the current nominee activation workflow for a project
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current activation workflow record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomineeActivationWorkflow"
        "404":
          description: No active activation workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: initiateNomineeActivation
      summary: Initiate nominee activation workflow (admin/developer only)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateNomineeActivationBody"
      responses:
        "201":
          description: Workflow initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomineeActivationWorkflow"
        "409":
          description: An active workflow already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateNomineeActivationWorkflow
      summary: Reject or cancel an activation workflow (admin only)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNomineeActivationBody"
      responses:
        "200":
          description: Workflow updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomineeActivationWorkflow"

  /projects/{id}/nominee/activation/send-otp:
    post:
      operationId: sendNomineeActivationOtp
      summary: Send or resend OTP for voluntary handover verification
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OTP sent (code visible in dev mode)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomineeActivationWorkflow"

  /projects/{id}/nominee/activation/verify:
    post:
      operationId: verifyNomineeActivation
      summary: Verify activation — admin confirms docs (death-based) or submits OTP (voluntary)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyNomineeActivationBody"
      responses:
        "200":
          description: Verified and activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NomineeActivationWorkflow"
        "400":
          description: Invalid OTP or missing input
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/lifecycle:
    get:
      operationId: getProjectLifecycle
      summary: Get project lifecycle status and history
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Project lifecycle data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectLifecycle"
    post:
      operationId: transitionProjectLifecycle
      summary: Transition project to next lifecycle status (admin/developer only)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransitionLifecycleBody"
      responses:
        "201":
          description: Lifecycle transition recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectLifecycleHistoryEntry"
        "400":
          description: Invalid transition
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/maturity:
    get:
      operationId: getProjectMaturity
      summary: Get active or latest maturity declaration for a project
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Maturity declaration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityDeclaration"
        "404":
          description: No declaration found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: initiateMaturityDeclaration
      summary: Initiate maturity declaration workflow (developer/admin only)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitiateMaturityBody"
      responses:
        "201":
          description: Declaration created and OTP verifications generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityDeclaration"
        "409":
          description: Blocked — one or more conditions prevent maturity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityBlockers"
    delete:
      operationId: cancelMaturityDeclaration
      summary: Cancel the active maturity declaration
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelMaturityBody"
      responses:
        "200":
          description: Cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /projects/{id}/maturity/blockers:
    get:
      operationId: getMaturityBlockers
      summary: Check real-time blockers for maturity declaration
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Blocker check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityBlockers"

  /projects/{id}/maturity/otp/{verificationId}/send:
    post:
      operationId: sendMaturityOtp
      summary: Send (or resend) OTP to a party — placeholder returns code in response
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: verificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: OTP dispatched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityOtpVerification"

  /projects/{id}/maturity/otp/{verificationId}/verify:
    post:
      operationId: verifyMaturityOtp
      summary: Verify OTP code for a party; completes declaration when all verified
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: verificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyOtpBody"
      responses:
        "200":
          description: OTP result — returns updated full declaration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MaturityDeclaration"
        "400":
          description: Wrong code, expired, or already verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/ownership-freeze:
    get:
      operationId: getOwnershipFreeze
      summary: Get ownership freeze record for a project
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Ownership freeze record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OwnershipFreeze"
        "404":
          description: Project is not yet frozen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{id}/missing-developer:
    get:
      operationId: getMissingDeveloperCase
      summary: Get active missing developer case for a project
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Active missing developer case with countdown details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingDeveloperCase"
        "404":
          description: No active missing developer case
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      operationId: fileMissingDeveloperCase
      summary: File a missing developer report for a project (admin/developer only)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FileMissingDeveloperCaseBody"
      responses:
        "201":
          description: Case filed, project status changed to missing_developer
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingDeveloperCase"
        "409":
          description: An active case already exists for this project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateMissingDeveloperCase
      summary: Update remarks or resolve/cancel a missing developer case (admin only)
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMissingDeveloperCaseBody"
      responses:
        "200":
          description: Case updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MissingDeveloperCase"
        "404":
          description: No active case found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"


  /projects/{id}/closure:
    get:
      operationId: getProjectClosureWorkflow
      summary: Get the current closure workflow for a project
      tags: [projects]
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Current closure workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectClosureWorkflow"
        "404":
          description: No active closure workflow
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
