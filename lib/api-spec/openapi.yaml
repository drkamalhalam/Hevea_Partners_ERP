  # ── Documents ──────────────────────────────────────────────────────────────

  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List accessible documents (role + project filtered)
      parameters:
        - name: category
          in: query
          schema:
            type: string
            enum: [agreement, template, supporting, governance, operational]
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
        - name: agreementId
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Filtered document list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Create document record post-upload (admin/developer)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/access-log:
    get:
      operationId: listDocumentAccessLog
      tags: [documents]
      summary: Document access audit log (admin/developer only)
      parameters:
        - name: documentId
          in: query
          schema:
            type: string
            format: uuid
        - name: projectId
          in: query
          schema:
            type: string
            format: uuid
        - name: limit
          in: query
          schema:
            type: integer
            default: 100
      responses:
        "200":
          description: Access log entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DocumentAccessLogEntry"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document metadata (access-checked)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Document metadata
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
        "403":
          description: Forbidden
        "404":
          description: Not found
    patch:
      operationId: updateDocument
      tags: [documents]
      summary: Update document metadata (admin/developer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDocumentBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/archive:
    post:
      operationId: archiveDocument
      tags: [documents]
      summary: Archive a document (admin/developer)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archived
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/restore:
    post:
      operationId: restoreDocument
      tags: [documents]
      summary: Restore an archived document (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}/download:
    get:
      operationId: downloadDocument
      tags: [documents]
      summary: Secure document download (access-checked, audit-logged)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: File stream
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "403":
          description: Forbidden
        "404":
          description: Not found

  /templates:
    get:
      tags: [templates]
      operationId: listTemplates
      summary: List agreement templates
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [active, archived]
      responses:
        "200":
          description: List of templates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgreementTemplate"
    post:
      tags: [templates]
      operationId: createTemplate
      summary: Create a new template record (after file upload)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTemplateBody"
      responses:
        "201":
          description: Template created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgreementTemplate"

  /templates/{id}:
    get:
      tags: [templates]
      operationId: getTemplate
      summary: Get a single template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Template detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgreementTemplate"
    patch:
      tags: [templates]
      operationId: updateTemplate
      summary: Update template metadata
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTemplateBody"
      responses:
        "200":
          description: Updated template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgreementTemplate"

  /templates/{id}/archive:
    post:
      tags: [templates]
      operationId: archiveTemplate
      summary: Archive a template
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Archived template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgreementTemplate"

  /templates/{id}/restore:
    post:
      tags: [templates]
      operationId: restoreTemplate
      summary: Restore an archived template (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Restored template
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgreementTemplate"




  /contributions/pending-verification:
    get:
      operationId: listPendingVerificationContributions
      summary: List contributions pending verification for the current user
      description: Returns contributions where the current user is the designated verifier and status is pending_verification. Also includes any pending items for admin/developer roles.
      tags: [Contributions]
      parameters:
        - name: projectId
          in: query
          required: false
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Pending verification items
          content:
            application/json:
              schema:
                type: object
                required: [contributions, totalCount]
                properties:
                  contributions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContributionEntry"
                  totalCount:
                    type: integer

  /contributions/{id}/request-verification:
    post:
      operationId: requestContributionVerification
      summary: Assign or reassign a counterparty verifier for a contribution
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [verifierUserId]
              properties:
                verifierUserId:
                  type: string
                  format: uuid
                notes:
                  type: string
      responses:
        "200":
          description: Verifier assigned
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ContributionEntry" }
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/{id}/verification-history:
    get:
      operationId: listContributionVerificationHistory
      summary: Get the verification event timeline for a contribution
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Verification event timeline
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContributionVerificationEvent"
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/land-notional:
    get:
      operationId: getLandNotionalContribution
      summary: Get the active land notional contribution for a project
      tags: [Contributions]
      parameters:
        - name: projectId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Land notional contribution state for the project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LandNotionalState"
        "400": { description: projectId required }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Project not found }

  /contributions/land-notional/history:
    get:
      operationId: getLandNotionalHistory
      summary: Full history of all land notional entries for a project (including rejected)
      tags: [Contributions]
      parameters:
        - name: projectId
          in: query
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Full land notional history
          content:
            application/json:
              schema:
                type: object
                required: [history]
                properties:
                  history:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContributionEntry"
        "400": { description: projectId required }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }

  /contributions:
    get:
      operationId: listContributions
      summary: List contribution ledger entries
      tags: [Contributions]
      parameters:
        - name: projectId
          in: query
          schema: { type: string, format: uuid }
        - name: partnerId
          in: query
          schema: { type: string, format: uuid }
        - name: contributionType
          in: query
          schema:
            type: string
            enum: [land_notional, economic_investment, operational_cost, recoverable_advance, manual_adjustment]
        - name: verificationStatus
          in: query
          schema:
            type: string
            enum: [draft, pending_verification, verified, rejected, disputed]
      responses:
        "200":
          description: List of contribution entries
          content:
            application/json:
              schema:
                type: object
                required: [contributions]
                properties:
                  contributions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ContributionEntry"
        "401": { description: Unauthorized }
    post:
      operationId: createContribution
      summary: Record a new contribution entry
      tags: [Contributions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContributionBody"
      responses:
        "201":
          description: Contribution created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Validation error }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }

  /contributions/summary:
    get:
      operationId: getContributionSummary
      summary: Aggregated contribution summary per project
      tags: [Contributions]
      parameters:
        - name: projectId
          in: query
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Summary aggregates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionSummary"
        "401": { description: Unauthorized }

  /contributions/{id}:
    get:
      operationId: getContribution
      summary: Get a single contribution entry
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Contribution entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "401": { description: Unauthorized }
        "404": { description: Not found }
    patch:
      operationId: updateContribution
      summary: Update contribution metadata (admin/developer only)
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContributionBody"
      responses:
        "200":
          description: Updated contribution entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Validation error }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }
    delete:
      operationId: deleteContribution
      summary: Soft-delete a contribution entry (admin only)
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204": { description: Deleted }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/{id}/submit:
    post:
      operationId: submitContributionForVerification
      summary: Submit a draft contribution for admin verification
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Contribution submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Already submitted or verified }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/{id}/verify:
    post:
      operationId: verifyContribution
      summary: Verify a contribution entry (admin only)
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Contribution verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Already verified }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/{id}/reject:
    post:
      operationId: rejectContribution
      summary: Reject a contribution entry (admin only)
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                notes:
                  type: string
      responses:
        "200":
          description: Contribution rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Already in terminal state }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/dispute-summary:
    get:
      operationId: getContributionDisputeSummary
      summary: Counts of disputed, pending, and rejected contributions per visible project
      tags: [Contributions]
      responses:
        "200":
          description: Dispute summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionDisputeSummary"
        "401": { description: Unauthorized }

  /contributions/{id}/dispute:
    post:
      operationId: raiseContributionDispute
      summary: Raise a dispute on a verified contribution (admin/developer only)
      description: Marks a verified contribution as disputed, triggering a governance alert and blocking the project from maturity declaration.
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [disputeNotes]
              properties:
                disputeNotes:
                  type: string
                  description: Reason for raising the dispute
      responses:
        "200":
          description: Dispute raised
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Can only dispute verified contributions }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /contributions/{id}/resolve-dispute:
    post:
      operationId: resolveContributionDispute
      summary: Resolve a disputed contribution (admin/developer only)
      description: Resolves a disputed contribution by re-verifying or rejecting it. Both actions clear the governance alert and maturity block.
      tags: [Contributions]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action:
                  type: string
                  enum: [re_verify, reject]
                  description: re_verify restores to verified; reject closes the dispute as rejected
                notes:
                  type: string
      responses:
        "200":
          description: Dispute resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContributionEntry"
        "400": { description: Contribution is not in disputed status }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /ownership/summary:
    get:
      operationId: getOwnershipSummary
      summary: Live ownership guidance for all visible projects
      tags: [Ownership]
      parameters:
        - in: query
          name: projectId
          schema: { type: string, format: uuid }
          required: false
      responses:
        "200":
          description: Ownership summary list
          content:
            application/json:
              schema:
                type: object
                required: [projects]
                properties:
                  projects:
                    type: array
                    items: { $ref: "#/components/schemas/ProjectOwnershipDetail" }
        "401": { description: Unauthorized }

  /ownership/{projectId}:
    get:
      operationId: getProjectOwnership
      summary: Live ownership detail for one project
      tags: [Ownership]
      parameters:
        - in: path
          name: projectId
          schema: { type: string, format: uuid }
          required: true
      responses:
        "200":
          description: Project ownership detail
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ProjectOwnershipDetail" }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /ownership/{projectId}/snapshots/{snapshotId}:
    get:
      operationId: getOwnershipSnapshot
      summary: Fetch a single ownership snapshot by ID
      tags: [Ownership]
      parameters:
        - in: path
          name: projectId
          schema: { type: string, format: uuid }
          required: true
        - in: path
          name: snapshotId
          schema: { type: string, format: uuid }
          required: true
      responses:
        "200":
          description: Single ownership snapshot
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OwnershipSnapshot" }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /ownership/{projectId}/snapshots:
    get:
      operationId: listOwnershipSnapshots
      summary: Snapshot history for a project
      tags: [Ownership]
      parameters:
        - in: path
          name: projectId
          schema: { type: string, format: uuid }
          required: true
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        "200":
          description: Snapshot list
          content:
            application/json:
              schema:
                type: object
                required: [snapshots, totalCount]
                properties:
                  snapshots:
                    type: array
                    items: { $ref: "#/components/schemas/OwnershipSnapshot" }
                  totalCount:
                    type: integer
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

    post:
      operationId: createOwnershipSnapshot
      summary: Save a manual ownership snapshot
      tags: [Ownership]
      parameters:
        - in: path
          name: projectId
          schema: { type: string, format: uuid }
          required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                notes: { type: string }
      responses:
        "201":
          description: Snapshot created
          content:
            application/json:
              schema: { $ref: "#/components/schemas/OwnershipSnapshot" }
        "400": { description: Bad request }
        "401": { description: Unauthorized }
        "403": { description: Forbidden }
        "404": { description: Not found }

  /valuations/value-to-percentage:
    post:
      operationId: computeTransferValueToPercentage
      summary: Compute equivalent ownership percentage from a transfer value (INR)
      tags: [Valuations]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectId, transferValue]
              properties:
                projectId: { type: string, format: uuid }
                transferValue: { type: number }
                valuationRunId: { type: string, format: uuid, nullable: true }
      responses:
        "200":
          description: Derived percentage
          content:
            application/json:
              schema:
                type: object
                required: [projectId, valuationRunId, projectGrossValue, transferValue, derivedPercentage, derivedPercentageFormatted]
                properties:
                  projectId: { type: string, format: uuid }
                  valuationRunId: { type: string, format: uuid }
                  projectGrossValue: { type: string }
                  transferValue: { type: number }
                  derivedPercentage: { type: number }
                  derivedPercentageFormatted: { type: string }
                  warning: { type: string, nullable: true }
        "400": { description: Validation error }
        "404": { description: Valuation run not found }
        "422": { description: No final valuation run found }

  /projects/{projectId}/partner-ownership-states:
    get:
      operationId: listPartnerOwnershipStates
      summary: List ownership state records for all partners in a project
      tags: [PartnerOwnershipState]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Partner ownership states
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/PartnerOwnershipState" }
        "401": { description: Unauthorized }

  /projects/{projectId}/partner-ownership-states/upsert:
    post:
      operationId: upsertPartnerOwnershipState
      summary: Create or update a partner ownership state record
      tags: [PartnerOwnershipState]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpsertPartnerOwnershipStateBody" }
      responses:
        "200":
          description: Updated state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerOwnershipState" }
        "201":
          description: Created state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerOwnershipState" }
        "400": { description: Validation error }
        "422": { description: Business rule violation }

  /projects/{projectId}/partner-ownership-states/{partnerId}:
    get:
      operationId: getPartnerOwnershipState
      summary: Get a single partner's ownership state record
      tags: [PartnerOwnershipState]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: partnerId
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Partner ownership state
          content:
            application/json:
              schema: { $ref: "#/components/schemas/PartnerOwnershipState" }
        "404": { description: Not found }

  /projects/{projectId}/partner-ownership-states/{partnerId}/dispute:
    post:
      operationId: markOwnershipDisputed
      summary: Mark a portion of a partner's ownership as disputed
      tags: [PartnerOwnershipState]
      parameters:
        - in: path
          name: projectId
          required: true
          schema: { type: string, format: uuid }
        - in: path
          name: partnerId
          required: true
          schema: { type: string, format: uuid }
