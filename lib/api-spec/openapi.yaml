        name:
          type: string
        description:
          type: string
        location:
          type: string
        village:
          type: string
        district:
          type: string
        state:
          type: string
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: number
        landValuePerUnit:
          type: number
        status:
          type: string
