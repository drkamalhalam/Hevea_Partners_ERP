        group:
          type: string
          enum: [project, parties, financial, dates, other]
        example:
          type: string
        resolvedValue:
          type: string
          nullable: true
          description: Auto-resolved value from linked data
        overrideValue:
          type: string
          nullable: true
          description: Manually entered override (takes precedence)
        effectiveValue:
          type: string
          nullable: true
