          type: string
          enum: [strong, moderate, at_risk, critical]
        costBurdenRating:
          type: string
          enum: [low, moderate, high, critical]
        lcaComplianceRating:
          type: string
          enum: [compliant, partial, outstanding]
        recoveryRating:
          type: string
          enum: [excellent, good, lagging, critical]
        overallSustainability:
          type: string
          enum: [strong, moderate, at_risk, critical]

    ProjectProfitabilityRow:
      type: object
      required: [projectId, projectName, partnerId, partnerName, grossEntitlement, operationalBurden, lcaIncome, recoverableAdj, netProfitability, costBurdenRatio]
      properties:
        projectId: { type: string, format: uuid }
        projectName: { type: string }
        partnerId: { type: string, format: uuid }
        partnerName: { type: string }
        grossEntitlement: { type: number }
        operationalBurden: { type: number }
        lcaIncome: { type: number }
        recoverableAdj: { type: number }
        netProfitability: { type: number }
        costBurdenRatio: { type: number }

    LandownerProfitabilityAnalytics:
      type: object
      required: [summary, yearlyBreakdown, costBurdenAnalysis, sustainabilityIndicators, projects]
      properties:
        summary:
          $ref: "#/components/schemas/LandownerProfitabilitySummary"
        yearlyBreakdown:
          type: array
          items:
            $ref: "#/components/schemas/YearlyProfitabilityRow"
        costBurdenAnalysis:
          $ref: "#/components/schemas/CostBurdenAnalysis"
        sustainabilityIndicators:
          $ref: "#/components/schemas/SustainabilityIndicators"
        projects:
          type: array
          items:
            $ref: "#/components/schemas/ProjectProfitabilityRow"
