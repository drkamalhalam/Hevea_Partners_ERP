components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Project:
      type: object
      required: [id, name, location, district, state, landArea, landAreaUnit, status, lifecycleStatus, startDate, termYears, isActive, createdAt]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: ["string", "null"]
        location:
          type: string
        village:
          type: ["string", "null"]
        district:
          type: string
        state:
          type: string
        landArea:
          type: number
        landAreaUnit:
          type: string
        landNotionalValue:
          type: ["number", "null"]
        landValuePerUnit:
          type: ["number", "null"]
        status:
          type: string
          enum: [planning, developing, maturing, tapping, completed, suspended, missing_developer]
        lifecycleStatus:
          type: string
          enum: [prematurity, mature_production, closed]
        startDate:
          type: string
        expectedMaturityDate:
          type: ["string", "null"]
        termYears:
          type: integer
        notes:
          type: ["string", "null"]
        isActive:
          type: boolean
        createdAt:
          type: string
        updatedAt:
          type: ["string", "null"]
        ownershipFrozenAt:
          type: ["string", "null"]

    ProjectInput:
      type: object
      required: [name, location, district, state, landArea, landAreaUnit, status, startDate, termYears]
