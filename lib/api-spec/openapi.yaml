            type: object
            properties:
              disputeType: { type: string }
              open: { type: integer }
              underReview: { type: integer }
              escalated: { type: integer }
        urgent:
          type: array
          items: { $ref: '#/components/schemas/Dispute' }

    EvidenceArchive:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string, nullable: true }
        projectName: { type: string, nullable: true }
        documentType: { type: string }
        title: { type: string }
        description: { type: string, nullable: true }
        tags: { type: array, nullable: true, items: { type: string } }
        versionNumber: { type: integer }
        parentArchiveId: { type: string, nullable: true }
        isLatestVersion: { type: boolean }
        fileObjectPath: { type: string, nullable: true }
        externalUrl: { type: string, nullable: true }
        originalFileName: { type: string, nullable: true }
        fileSizeBytes: { type: integer, nullable: true }
        mimeType: { type: string, nullable: true }
        checksum: { type: string, nullable: true }
        relatedTable: { type: string, nullable: true }
        relatedRecordId: { type: string, nullable: true }
        documentDate: { type: string, nullable: true }
        issuingAuthority: { type: string, nullable: true }
        referenceNumber: { type: string, nullable: true }
        uploadedById: { type: string, nullable: true }
        uploadedByName: { type: string, nullable: true }
        uploadedByRole: { type: string, nullable: true }
        archiveStatus: { type: string }
        metadata: { type: object, nullable: true, additionalProperties: true }
        accessCount: { type: integer, nullable: true }
        archivedAt: { type: string }
        createdAt: { type: string }

    EvidenceAccessLog:
      type: object
